<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nergis Buketi</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #d1e2ed; /* Yeni, daha açık arka plan rengi */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
            position: relative;
        }

        /* SVG Çizim Alanı */
        svg {
            width: 450px; /* Daha büyük SVG alanı */
            height: 550px;
            overflow: visible; /* Çiçeklerin taşmasına izin ver */
        }

        /* Buton Stili */
        #toggleBtn {
            margin-top: 30px; /* Konumu biraz aşağıya çekildi */
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            background-color: #e6b800; /* Sarı buton */
            color: white;
            border: none;
            border-radius: 25px;
            transition: background 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #toggleBtn:hover {
            background-color: #cca300;
        }

        /* Not Stili */
        #note {
            margin-top: 20px;
            font-size: 1.5rem;
            color: #555;
            font-style: italic;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.5s ease;
            height: 0;
            overflow: hidden;
        }

        #note.show {
            opacity: 1;
            transform: translateY(0);
            height: auto;
        }

        /* Vazo dış çizgisi */
        .vazo-border {
            fill: none;
            stroke: #8a97a3; /* Gri renk */
            stroke-width: 1.5;
        }

        /* Vazo iç dolgusu (hafif şeffaf) */
        .vazo-fill {
            fill: #b0bbc4; /* Açık gri-mavi */
            opacity: 0.3; /* Daha şeffaf */
        }

        /* Vazo altın detayı */
        .vazo-gold {
            fill: #c5a059; /* Altın sarısı */
        }

        /* Çiçek sapları */
        .stem {
            stroke: #4a6741; /* Yeşil */
            stroke-width: 2;
            fill: none;
        }

        /* Çiçek yaprakları */
        .petal {
            fill: white;
            stroke: #555; /* Daha belirgin dış çizgi */
            stroke-width: 0.5;
        }

        /* Çiçek ortası */
        .center {
            fill: #ffcc00; /* Sarı */
            stroke: #e6ac00; /* Koyu sarı kenar */
            stroke-width: 0.5;
        }
    </style>
</head>

    <br>
    <button id="toggleBtn">Tıkla</button>

<script>
    const btn = document.getElementById('toggleBtn');
    const note = document.getElementById('note');

    btn.addEventListener('click', () => {
        note.classList.toggle('show');
    });
</script>
